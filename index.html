<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 AI 활용 Tier는?</title>
<meta name="description" content="10개의 질문으로 당신의 AI 활용 수준을 진단합니다. 전 세계 AI 유저 비교군 리서치 기반.">
<meta property="og:title" content="나의 AI 활용 Tier는?">
<meta property="og:description" content="10개의 질문으로 당신의 AI 활용 수준을 진단합니다.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:0.6}50%{opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const f="'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",m="'SF Mono','JetBrains Mono',monospace";
const pg={minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 24px",background:"#fff"};
const questions=[
{id:1,axis:"A",text:"AI한테 주로 뭘 시키나요?",options:[{score:1,label:"검색 대신 질문하기"},{score:2,label:"요약 / 번역 / 초안 작성"},{score:3,label:"프롬프트를 직접 설계해서 사용"},{score:4,label:"자동화 / 파이프라인 구축"},{score:5,label:"시스템 구축 / 방법론 설계"}]},
{id:2,axis:"A",text:"AI 대화를 시작할 때\n어떻게 하나요?",options:[{score:1,label:"그냥 물어봄"},{score:2,label:"역할을 지정함"},{score:3,label:"커스텀 인스트럭션 세팅"},{score:4,label:"프로젝트 / 시스템 프롬프트 설계"},{score:5,label:"스킬 / 에이전트 구조 설계"}]},
{id:3,axis:"A",text:"AI가 준 결과물이\n마음에 안 들면?",options:[{score:1,label:"다시 물어봄"},{score:2,label:"프롬프트를 수정해봄"},{score:3,label:"왜 안 되는지 분석 후 접근법 변경"},{score:4,label:"프롬프트 자체를 구조적으로 재설계"},{score:5,label:"진단 체크리스트나 QA 프로세스로 점검"}]},
{id:4,axis:"A",text:"AI를 활용한\n워크플로우가 있나요?",options:[{score:1,label:"없음"},{score:2,label:"비슷한 프롬프트를 반복 사용"},{score:3,label:"특정 업무에 정해진 흐름이 있음"},{score:4,label:"여러 단계를 연결한 파이프라인 있음"},{score:5,label:"도구 간 연동 / 자동화 시스템 운용 중"}]},
{id:5,axis:"A",text:"AI 관련 도구를\n몇 개나 쓰나요?",options:[{score:1,label:"ChatGPT 또는 Claude 하나"},{score:2,label:"2~3개 병행"},{score:3,label:"API나 확장 기능 활용"},{score:4,label:"MCP / 플러그인 / 외부 도구 연동"},{score:5,label:"커스텀 도구 / 스킬 / 에이전트 직접 구축"}]},
{id:6,axis:"A",text:"AI로 만든 것 중\n가장 복잡한 건?",options:[{score:1,label:"텍스트 답변 받은 거"},{score:2,label:"문서 / 초안"},{score:3,label:"커스텀 프롬프트 / 페르소나"},{score:4,label:"자동화 워크플로우 / 파이프라인"},{score:5,label:"시스템 / 방법론 / 제품"}]},
{id:7,axis:"B",text:"AI를 쓰는 분야가\n몇 개인가요?",sub:"실제 산출물 기준",options:[{score:1,label:"1개"},{score:2,label:"2개"},{score:3,label:"3개"},{score:4,label:"4개"},{score:5,label:"5개 이상"}]},
{id:8,axis:"B",text:"서로 다른 분야의\nAI 활용이 연결되나요?",options:[{score:1,label:"분야별 따로 사용"},{score:3,label:"가끔 연결됨"},{score:5,label:"하나의 시스템으로 관통"}]},
{id:9,axis:"C",text:"본인의 AI 활용법을\n정리해둔 게 있나요?",options:[{score:1,label:"없음, 그때그때"},{score:2,label:"메모 / 노트 수준"},{score:3,label:"가이드 / 문서로 정리"},{score:4,label:"템플릿 / 스킬 파일로 패키징"},{score:5,label:"타인이 실제로 사용한 적 있음"}]},
{id:10,axis:"C",text:"다른 사람이 내 방식을\n따라할 수 있나요?",options:[{score:1,label:"설명하기 어려움"},{score:2,label:"말로는 설명 가능"},{score:3,label:"문서 보면 따라할 수 있을 듯"},{score:4,label:"문서 + 템플릿을 줬음"},{score:5,label:"실제로 따라한 사람 있음"}]}
];
const tierData=[
{tier:1,name:"입문자",label:"Newcomer",color:"#86868b",desc:"AI에게 가끔 질문하는 정도. 검색 대신 써보는 단계.",emoji:"🌱"},
{tier:2,name:"활용자",label:"Adopter",color:"#0071e3",desc:"요약, 번역, 초안 등 업무 보조로 정착. 반복 사용 중.",emoji:"⚡"},
{tier:3,name:"설계자",label:"Designer",color:"#bf4800",desc:"프롬프트를 직접 설계하고 최적화. 나만의 사용법이 있음.",emoji:"✏️"},
{tier:4,name:"빌더",label:"Builder",color:"#1d7c4d",desc:"워크플로우·파이프라인을 구축하고 자동화를 운용.",emoji:"🔧"},
{tier:5,name:"아키텍트",label:"Architect",color:"#c41e3a",desc:"시스템을 빌드하고 방법론을 설계·문서화·배포.",emoji:"🏗️"},
{tier:6,name:"프로덕트 메이커",label:"Product Maker",color:"#6e2dc2",desc:"AI로 제품을 만들어 실유저에게 배포. API 직접 활용.",emoji:"🚀"},
{tier:7,name:"AI 비즈니스",label:"AI Business",color:"#1d1d1f",desc:"AI 기반으로 실매출 발생. 사업 자체가 AI.",emoji:"👑"}
];
const ax={A:{label:"활용 깊이",color:"#0071e3"},B:{label:"도메인 범위",color:"#1d7c4d"},C:{label:"재현 가능성",color:"#bf4800"}};
const SITE_URL="https://kimshiro0328-hue.github.io/ai-tier-test";
function calc(ans){const s={A:0,B:0,C:0},mx={A:30,B:10,C:10};ans.forEach(a=>{s[a.axis]+=a.score});const nA=(s.A/mx.A)*100,nB=(s.B/mx.B)*100,nC=(s.C/mx.C)*100;const w=nA*0.6+nB*0.2+nC*0.2;let t;if(w<25)t=1;else if(w<38)t=2;else if(w<50)t=3;else if(w<63)t=4;else if(w<75)t=5;else if(w<88)t=6;else t=7;return{tier:t,tierInfo:tierData[t-1],axes:{A:{pct:Math.round(nA)},B:{pct:Math.round(nB)},C:{pct:Math.round(nC)}}};}

function Start({onStart}){
return <div style={pg}><div style={{maxWidth:"400px",textAlign:"center",animation:"fadeIn 0.7s ease-out"}}>
<p style={{fontSize:"48px",marginBottom:"32px"}}>🤖</p>
<h1 style={{fontSize:"28px",fontWeight:700,color:"#1d1d1f",lineHeight:1.3,marginBottom:"12px",fontFamily:f,letterSpacing:"-0.022em"}}>나의 AI 활용 Tier는?</h1>
<p style={{fontSize:"17px",color:"#86868b",lineHeight:1.6,marginBottom:"40px",fontFamily:f}}>10개의 질문으로 당신의 AI 활용 수준을<br/>진단합니다.</p>
<button onClick={onStart} style={{padding:"14px 32px",borderRadius:"980px",fontSize:"17px",fontWeight:600,color:"#fff",border:"none",cursor:"pointer",background:"#0071e3",fontFamily:f,letterSpacing:"-0.01em"}}>시작하기</button>
<p style={{color:"#86868b",fontSize:"12px",marginTop:"24px",fontFamily:f}}>약 2분 소요</p>
<p style={{color:"#d2d2d7",fontSize:"11px",marginTop:"8px",fontFamily:m}}>by <a href="https://twitter.com/kimshiro_end" target="_blank" rel="noopener" style={{color:"#86868b",textDecoration:"none"}}>@kimshiro_end</a></p>
</div></div>;
}

function Question({question:q,index:i,total,onAnswer,onBack,selected}){
const ai=ax[q.axis];
return <div style={pg}><div style={{width:"100%",maxWidth:"440px",animation:"fadeIn 0.4s ease-out"}}>
<div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"40px"}}>
{i>0?<button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",fontSize:"16px",color:"#86868b",padding:"4px",flexShrink:0}}>←</button>:<div style={{width:"24px",flexShrink:0}}/>}
<div style={{flex:1,height:"2px",background:"#f5f5f7",borderRadius:"1px"}}><div style={{height:"2px",borderRadius:"1px",width:((i+1)/total*100)+"%",background:"#0071e3",transition:"width 0.4s ease"}}/></div>
<span style={{fontSize:"13px",color:"#86868b",fontFamily:m,flexShrink:0}}>{i+1}/{total}</span>
</div>
<h2 style={{fontSize:"24px",fontWeight:600,color:"#1d1d1f",lineHeight:1.4,marginBottom:"8px",whiteSpace:"pre-line",fontFamily:f,letterSpacing:"-0.022em"}}>{q.text}</h2>
{q.sub&&<p style={{fontSize:"14px",color:"#86868b",marginBottom:"8px",fontFamily:f}}>{q.sub}</p>}
<p style={{fontSize:"12px",color:ai.color,marginBottom:"32px",fontFamily:m}}>{ai.label}</p>
<div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
{q.options.map((o,j)=><button key={j} onClick={()=>onAnswer(q.id,q.axis,o.score)} style={{width:"100%",textAlign:"left",padding:"16px 20px",borderRadius:"12px",border:selected===o.score?"2px solid #0071e3":"1px solid #d2d2d7",background:selected===o.score?"#f0f7ff":"#fff",color:"#1d1d1f",fontSize:"15px",fontWeight:selected===o.score?600:400,cursor:"pointer",transition:"all 0.15s",fontFamily:f,letterSpacing:"-0.01em"}}>{o.label}</button>)}
</div></div></div>;
}

function Loading(){
const[d,setD]=useState("");
useEffect(()=>{const iv=setInterval(()=>setD(p=>p.length>=3?"":p+"."),500);return()=>clearInterval(iv)},[]);
return <div style={pg}><p style={{fontSize:"13px",color:"#86868b",fontFamily:f,animation:"pulse 1.5s ease-in-out infinite"}}>분석 중{d}</p></div>;
}

function Result({result,onRestart}){
const{tier,tierInfo,axes}=result;
const[copied,setCopied]=useState(false);
const[showBox,setShowBox]=useState(false);
const shareText=`나의 AI 활용 Tier: ${tierInfo.emoji} Tier ${tier} "${tierInfo.name}"\n${tierInfo.desc}\n\n깊이 ${axes.A.pct}% | 범위 ${axes.B.pct}% | 재현 ${axes.C.pct}%\n\n나도 해보기 → ${SITE_URL}\n\n#AI활용Tier #AI진단`;
const shareT=()=>{try{const w=window.open("https://twitter.com/intent/tweet?text="+encodeURIComponent(shareText),"_blank");if(!w)setShowBox(true)}catch(e){setShowBox(true)}};
const copy=()=>{try{const ta=document.createElement("textarea");ta.value=shareText;ta.style.cssText="position:fixed;left:-9999px";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),2000)}catch(e){setShowBox(true)}};
const Bar=({axis})=><div style={{marginBottom:"16px"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:"6px"}}><span style={{fontSize:"13px",color:"#86868b",fontFamily:f}}>{ax[axis].label}</span><span style={{fontSize:"13px",color:"#1d1d1f",fontFamily:m,fontWeight:600}}>{axes[axis].pct}%</span></div><div style={{width:"100%",height:"4px",borderRadius:"2px",background:"#f5f5f7"}}><div style={{height:"4px",borderRadius:"2px",width:axes[axis].pct+"%",background:ax[axis].color,transition:"width 1s ease-out"}}/></div></div>;

return <div style={{...pg,justifyContent:"flex-start",paddingTop:"60px"}}>
<div style={{maxWidth:"400px",width:"100%",textAlign:"center",animation:"fadeIn 0.6s ease-out"}}>
<p style={{fontSize:"44px",marginBottom:"16px"}}>{tierInfo.emoji}</p>
<p style={{fontSize:"13px",color:"#86868b",fontFamily:m,letterSpacing:"0.08em",marginBottom:"4px"}}>TIER {tier}</p>
<h1 style={{fontSize:"32px",fontWeight:700,color:"#1d1d1f",fontFamily:f,letterSpacing:"-0.022em",marginBottom:"4px"}}>{tierInfo.name}</h1>
<p style={{fontSize:"13px",color:"#86868b",fontFamily:m,marginBottom:"20px"}}>{tierInfo.label}</p>
<p style={{fontSize:"15px",color:"#424245",lineHeight:1.6,marginBottom:"36px",fontFamily:f}}>{tierInfo.desc}</p>
<div style={{textAlign:"left",marginBottom:"32px"}}><Bar axis="A"/><Bar axis="B"/><Bar axis="C"/></div>

<div style={{display:"flex",gap:"8px",justifyContent:"center",marginBottom:"12px"}}>
<button onClick={shareT} style={{padding:"10px 20px",borderRadius:"980px",fontSize:"14px",fontWeight:600,color:"#fff",border:"none",cursor:"pointer",background:"#1d9bf0",fontFamily:f}}>🐦 트위터 공유</button>
<button onClick={copy} style={{padding:"10px 20px",borderRadius:"980px",fontSize:"14px",fontWeight:600,color:"#0071e3",border:"1px solid #0071e3",cursor:"pointer",background:"transparent",fontFamily:f}}>{copied?"✅ 복사됨!":"📋 결과 복사"}</button>
</div>

{showBox&&<div style={{marginTop:"12px",padding:"12px",borderRadius:"12px",background:"#f5f5f7",textAlign:"left"}}>
<textarea readOnly value={shareText} onFocus={e=>e.target.select()} style={{width:"100%",height:"100px",padding:"8px",borderRadius:"8px",fontSize:"13px",color:"#1d1d1f",resize:"none",background:"#fff",border:"1px solid #d2d2d7",fontFamily:f}}/>
<button onClick={()=>setShowBox(false)} style={{marginTop:"4px",color:"#86868b",fontSize:"11px",background:"none",border:"none",cursor:"pointer"}}>닫기</button>
</div>}

<button onClick={onRestart} style={{color:"#0071e3",fontSize:"14px",background:"none",border:"none",cursor:"pointer",fontFamily:f,fontWeight:600,marginTop:"4px"}}>다시 하기</button>

<div style={{width:"100%",height:"1px",background:"#f5f5f7",margin:"32px 0"}}/>

<p style={{fontSize:"11px",color:"#86868b",fontFamily:m,letterSpacing:"0.08em",marginBottom:"20px"}}>ALL TIERS</p>
<div style={{textAlign:"left"}}>
{tierData.map(t=>{const me=t.tier===tier;return <div key={t.tier} style={{display:"flex",alignItems:"center",gap:"12px",padding:"14px 12px",borderRadius:me?"12px":"0",background:me?tierInfo.color+"0A":"transparent",border:me?"1.5px solid "+tierInfo.color+"20":"none",borderBottom:me?"none":"1px solid #f5f5f7",marginBottom:me?"4px":"0"}}>
<span style={{fontSize:"20px",width:"32px",textAlign:"center"}}>{t.emoji}</span>
<div style={{flex:1}}>
<div style={{display:"flex",alignItems:"center",gap:"6px"}}>
<span style={{fontSize:"12px",fontFamily:m,fontWeight:600,color:me?tierInfo.color:"#86868b"}}>Tier {t.tier}</span>
<span style={{fontSize:"15px",fontWeight:me?700:400,color:"#1d1d1f",fontFamily:f}}>{t.name}</span>
{me&&<span style={{fontSize:"11px",padding:"3px 8px",borderRadius:"6px",fontWeight:700,background:tierInfo.color,color:"#fff",fontFamily:m}}>YOU</span>}
</div>
<p style={{fontSize:"12px",color:me?"#1d1d1f":"#86868b",marginTop:"2px",fontFamily:f}}>{t.desc}</p>
</div></div>})}
</div>

<p style={{color:"#d2d2d7",fontSize:"10px",marginTop:"32px",fontFamily:m}}>AI User Tier Diagnostic v1.0 · by <a href="https://twitter.com/kimshiro_end" target="_blank" rel="noopener" style={{color:"#86868b",textDecoration:"none"}}>@kimshiro_end</a></p>
</div></div>;
}

function App(){
const[phase,setPhase]=useState("start");
const[curQ,setCurQ]=useState(0);
const[ans,setAns]=useState([]);
const[result,setResult]=useState(null);
const[sel,setSel]=useState(null);
const start=()=>{setPhase("question");setCurQ(0);setAns([]);setResult(null);setSel(null)};
const back=()=>{if(curQ>0){setCurQ(curQ-1);setSel(null)}};
const answer=(id,axis,score)=>{setSel(score);const na=[...ans.filter(a=>a.id!==id),{id,axis,score}];setTimeout(()=>{setAns(na);setSel(null);if(curQ<questions.length-1)setCurQ(curQ+1);else{setPhase("loading");setTimeout(()=>{setResult(calc(na));setPhase("result")},1500)}},250)};
if(phase==="start")return <Start onStart={start}/>;
if(phase==="question")return <Question question={questions[curQ]} index={curQ} total={questions.length} onAnswer={answer} onBack={back} selected={sel}/>;
if(phase==="loading")return <Loading/>;
if(phase==="result")return <Result result={result} onRestart={start}/>;
return null;
}
ReactDOM.render(<App/>,document.getElementById("root"));
</script>
<!-- GoatCounter 방문자 카운터 (무료) -->
<!-- 1. https://www.goatcounter.com 가입 -->
<!-- 2. 사이트 코드 받으면 아래 ai-tier-test를 교체 -->
<script data-goatcounter="https://ai-tier-test.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
